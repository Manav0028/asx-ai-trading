version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Server deployment: always-on schedulers + IB Gateway (headless, auto-reconnect)
#
# Architecture:
#   ib-gateway  → IB Gateway + IBC (headless IBKR, auto-login/restart)
#   asx_scheduler → ASX pipeline (connects to ib-gateway:4002)
#   nse_scheduler → NSE pipeline (connects to ib-gateway:4002)
#   redis         → lightweight cache
#
# Database: Supabase PostgreSQL (external, configured in .env.server)
# LLM: Anthropic Claude API (fallback when Ollama unavailable)
#
# Usage:
#   cp .env.server.template .env.server   # fill in credentials
#   docker-compose -f docker-compose.server.yml up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── IB Gateway (headless IBKR with auto-reconnect) ─────────────────────────
  # Uses IBC to automate login and handle daily restarts.
  # Paper trading: port 4002 (live would be 4001)
  # VNC available on port 5900 for debugging (password: ibgateway)
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:10.30.1t
    restart: always
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: paper                    # "paper" or "live"
      TWS_SETTINGS_PATH: /opt/ibc/config.ini
      # IBC auto-restart: keeps gateway alive 24/7
      IBC_INI: "yes"
      IBC_TRADING_MODE: paper
      # Accept incoming API connections (no manual click needed)
      READ_ONLY_API: "no"
      # Timezone for auto-restart scheduling
      TZ: Australia/Sydney
    ports:
      - "4001:4001"    # live API
      - "4002:4002"    # paper API
      - "5900:5900"    # VNC (for debugging)
    volumes:
      - ib_gateway_data:/opt/ibgateway
    ulimits:
      nofile:
        soft: 10000
        hard: 10000
    healthcheck:
      # Check if IB Gateway API port is accepting connections
      test: ["CMD-SHELL", "nc -z localhost 4002 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s    # IB Gateway takes ~60-90s to start + login

  # ── Redis (lightweight cache) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ASX Scheduler ──────────────────────────────────────────────────────────
  asx_scheduler:
    build: .
    restart: always
    environment:
      EXCHANGE: asx
      TZ: Australia/Sydney
      # Point IBKR connection to the ib-gateway container
      IBKR_HOST: ib-gateway
      IBKR_PORT: 4002
    env_file: .env.server
    depends_on:
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    command: python main.py

  # ── NSE Scheduler ──────────────────────────────────────────────────────────
  nse_scheduler:
    build: .
    restart: always
    environment:
      EXCHANGE: nse
      TZ: Asia/Kolkata
      # NSE also connects to the same IB Gateway
      IBKR_HOST: ib-gateway
      IBKR_PORT: 4002
    env_file: .env.server
    depends_on:
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    command: python main.py

volumes:
  ib_gateway_data:
